<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap-utilities.rtl.min.css">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap-reboot.rtl.min.css">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap-grid.rtl.min.css">
    <link rel="stylesheet" href="assets/style/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <main class="container-fluid">
        <div class="row">
            <div class="col-sm-12 col-md-7 d-flex justify-content-center" style="height: 100vh;">
                <div class="w-75 h-50 mt-5">
                    <form action="info.html" method="post">
                        <h2 class="mx-4 mt-3" style="color: rgb(255, 187, 0);">خوش آمدید!<span><i class="bi bi-emoji-smile"></i></span></h2>
                        <div class="mt-3 row">
                            <input type="text" name="firstname" class="col-8 ms-5 form-control border border-success" placeholder="نام">
                            <div id="firstnameError" class="col-4 form-text ms-5 error"></div>
                        </div>
                        <div class="mt-3 row">
                            <input type="text" name="lastname" class="col-8 ms-5 form-control border border-success"  placeholder="نام خانوادگی">
                            <div id="lastnameError" class="form-text ms-5 error"></div>
                        </div>
                        <div class="mt-3 row">
                            <input type="text" name="username" class="col-8 ms-5 form-control border border-success"  placeholder="نام کاربری">
                            <div id="usernameError" class="form-text ms-5 error"></div>
                        </div>
                        <div class="mt-3 row">
                            <input type="text" name="nationalCode" class="col-8 ms-5 form-control border border-success"  placeholder="کد ملی">
                            <div id="nationalCodeError" class="form-text ms-5 error"></div>
                        </div>
                        <div class="form-check form-check-inline mt-3 ms-5">
                            <input type="radio" name="gender" class="form-check-input border border-success" id="male" onchange="selectGender(this)">
                            <label for="male" class="form-check-label">مرد</label>
                        </div>
                        <div class="form-check form-check-inline mt-3 ms-5">
                            <input type="radio" name="gender" class="form-check-input border border-success"  id="female" onchange="selectGender(this)">
                            <label for="female" class="form-check-label">زن</label>
                        </div>
                        <span id="gendererror" class="error"></span>
                        <div class="form-check mt-3 ms-5">
                            <input type="checkbox" name="approve" class="form-check-input border border-success" id="approve">
                            <label for="approve" class="form-check-label">قوانین را می پذیرم.</label>
                        </div>
                        <button type="submit" class="btn btn-warning pe-4 ps-4 mt-3 mb-1 ms-3" id="btnSend">
                            تایید
                        </button>            
                    </form>
                    <div id="info" class="mt-2"></div>
                </div>

            </div>
            <div class="d-sm-none d-md-block col-md-5" style="height: 100vh;">
                <img src="assets/images/17722978_5904823.jpg" class='w-100 h-100' alt="">
            </div>
        </div>
    </main>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/bootstrap/js/jquery-3.7.1.min.js"></script>
    <script src="assets/javascript/form.js"></script> 
</body>
</html>
